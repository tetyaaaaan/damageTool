<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲームツール｜tetinet</title>
  <meta name="description" content="tetinetで公開しているゲーム向けツールの一覧です。">
  <link rel="stylesheet" href="/games/css/style.css">
  <link rel="stylesheet" href="/games/css/menu.css">
  <link rel="icon" href="/games/images/icon/te_maru.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/games/images/icon/te_maru.ico">
</head>
<body class="tool-page site-home">
  <div id="wrapper">
    <header class="site-header">
      <a class="site-logo" href="/">tetinet</a>
      <nav class="site-nav" aria-label="メインメニュー">
        <a href="/games/">ゲーム</a>
        <a href="/games/genshin/">原神</a>
        <a href="/games/hsr/">崩壊スターレイル</a>
        <a href="/games/privacy/">プライバシー</a>
      </nav>
    </header>

    <main>
      <section class="home-hero home-hero--compact">
        <p class="hero-kicker">Games</p>
        <h1>ゲームツール</h1>
        <p>公開中のゲーム向けツールをまとめています。</p>
      </section>

      <section class="home-section" aria-labelledby="games-heading">
        <div class="section-heading">
          <p class="hero-kicker">Tool list</p>
          <h2 id="games-heading">公開中</h2>
        </div>

        <div class="home-card-grid">
          <a class="home-card" href="/games/genshin/">
            <span>Genshin Impact</span>
            <strong>原神 ダメージ計算</strong>
            <p>蒸発・溶解・激化などの条件を入力して、ダメージの目安を確認できます。</p>
          </a>

          <a class="home-card" href="/games/hsr/">
            <span>Honkai: Star Rail</span>
            <strong>崩壊:スターレイル ダメージ計算</strong>
            <p>UID取得と手入力を組み合わせて、戦闘ステータスを確認できます。</p>
          </a>

          <a class="home-card" href="/games/granblue/">
            <span>Granblue Fantasy</span>
            <strong>グラブル ツール</strong>
            <p>既存ツールを整理しながら、今後の追加に備える場所です。</p>
          </a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
